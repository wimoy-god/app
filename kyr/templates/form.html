<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ action }} мастер-класс</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>{{ action }} мастер-класс</h1>
    <form method="post">
      <label>Название<br>
        <input type="text" name="title" value="{{ master.title if master else '' }}" required>
      </label>
      <label>Инструктор<br>
        <input type="text" name="instructor" value="{{ master.instructor if master else '' }}">
      </label>
      <label>Дата (YYYY-MM-DD or ISO)<br>
        <input type="datetime-local" name="date" value="{{ master.date.strftime('%Y-%m-%dT%H:%M') if master and master.date else '' }}">
      </label>
      <label>Мест<br>
        <input type="number" name="seats" min="0" value="{{ master.seats if master else 0 }}">
      </label>
      <label>Описание<br>
        <textarea name="description">{{ master.description if master else '' }}</textarea>
      </label>
      <div class="form-actions">
        <button type="submit">{{ action }}</button>
        <a href="/">Отмена</a>
      </div>
    </form>
  </div>
</body>
</html>
